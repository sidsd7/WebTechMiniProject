<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Quiz Game</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="floating-icons"></div>
    <div class="artist-background"></div>
    <div class="quiz-container">
        <div class="title">🎶 Tune Trivia 🎸</div>
        <div class="welcome-message">Welcome to the Music Quiz Game! Get ready to test your music knowledge!</div>
        <div class="mode-selection">
            <button onclick="startGame('single')">Single Player</button>
            <button onclick="startGame('multi')">Multiplayer</button>
        </div>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
